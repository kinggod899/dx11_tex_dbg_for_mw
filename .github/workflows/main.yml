name: Auto Build DX11 Tool

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 获取源码
      uses: actions/checkout@v4
      # 不需要 submodules 了

    - name: 手动下载 minhook（替代子模块）
      run: |
        # 下载 minhook 源码
        curl -L -o minhook.zip https://github.com/TsudaKageyu/minhook/archive/refs/heads/master.zip
        # 解压
        tar -xf minhook.zip
        # 移动到正确位置
        move minhook-master libs\minhook
        # 确认目录存在
        if exist libs\minhook (echo [OK] libs\minhook 已就绪) else (echo [FAIL] 目录不存在 && exit 1)
      shell: cmd

    - name: 配置 CMake
      run: cmake -B build

    - name: 开始编译 (Release模式)
      run: cmake --build build --config Release

    - name: 打包生成的 exe 和 dll 文件
      uses: actions/upload-artifact@v4
      with:
        name: MW_Tool_Release
        path: |
          build/**/*.exe
          build/**/*.dll
