name: Auto Build DX11 Tool

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 获取源码
      uses: actions/checkout@v4

    - name: 手动下载 minhook（替代子模块）
      run: |
        echo 正在下载 minhook...
        curl -L -o minhook.zip https://github.com/TsudaKageyu/minhook/archive/refs/heads/master.zip
        echo 正在解压...
        tar -xf minhook.zip
        echo 移动到 libs\minhook...
        move minhook-master libs\minhook
        if exist libs\minhook (echo [OK] 下载成功) else (echo [FAIL] 目录不存在 && exit 1)
      shell: cmd

    - name: 配置 CMake
      run: cmake -B build

    - name: 开始编译 (Release模式)
      run: cmake --build build --config Release

    - name: 打包生成的 exe 和 dll 文件
      uses: actions/upload-artifact@v4
      with:
        name: MW_Tool_Release
        path: |
          build/**/*.exe
          build/**/*.dll
